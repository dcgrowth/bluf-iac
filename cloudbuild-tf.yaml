# options:
#   logging: CLOUD_LOGGING_ONLY
steps:
  - name: "hashicorp/terraform:1.7"
    id: "terraform-apply"
    script: |
      terraform init
      terraform apply -auto-approve
    env:
      - "TF_VAR_db_password=$_DB_PASSWORD"

# This is the "Sidecar"
services:
  - name: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.1"
    id: "sql-proxy"
    # Use the --address flag to ensure it binds to localhost
    args:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "bluf-489122:northamerica-northeast1:bluf2020"
