steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "terraform-with-proxy"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.1/cloud-sql-proxy.linux.amd64
        chmod +x cloud-sql-proxy
        ./cloud-sql-proxy --address 0.0.0.0 --port 5432 bluf-489122:northamerica-northeast1:bluf2020 & 
        sleep 5
        apt-get update -qq && apt-get install -y -qq wget unzip
        wget -q https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
        unzip -q terraform_1.6.0_linux_amd64.zip
        chmod +x terraform
        mv terraform /usr/local/bin/
        cd terraform
        /usr/local/bin/terraform init
        /usr/local/bin/terraform apply -auto-approve

options:
  logging: CLOUD_LOGGING_ONLY
