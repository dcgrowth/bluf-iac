steps:
  - name: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.1"
    id: "sql-proxy"
    args:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "bluf-489122:northamerica-northeast1:bluf2020"
    waitFor: ["-"]

  - name: "hashicorp/terraform:latest"
    args: ["init"]
    dir: "terraform"

  - name: "hashicorp/terraform:latest"
    args: ["plan", "-out=tfplan"]
    dir: "terraform"

  - name: "hashicorp/terraform:latest"
    args: ["apply", "-auto-approve", "tfplan"]
    dir: "terraform"

options:
  logging: CLOUD_LOGGING_ONLY
